<!-- NOVA PÀGINA PER UNIR PDFs (fins a 9, amb compressió opcional) -->
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juntar♾️PDFs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Sortable per arrossegar i reordenar -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- pdf.js per renderitzar pàgines durant la compressió -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        // Configurar worker de pdf.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <style>
        /* ==================== */
        /* MATEIX ESTIL GOVERN BALEAR (ampliat) */
        /* ==================== */
        :root {
            --blau-mari: #004481;
            --blau-clar: #5A9FD4;
            --blau-fons: #E8F1F8;
            --gris-fosc: #333333;
            --gris-mitja: #666666;
            --gris-clar: #F5F7FA;
            --blanc: #FFFFFF;
            --verd-success: #28a745;
            --vermell-error: #dc3545;
            --taronja-warn: #fd7e14;
            --shadow: 0 10px 30px rgba(0, 68, 129, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--gris-fosc);
            background: var(--blau-fons);
            background-image: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Targeta principal */
        .pdf-card {
            background: var(--blanc);
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--blau-mari);
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--gris-mitja);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Badge de límit */
        .limit-badge {
            background: linear-gradient(135deg, var(--blau-mari), var(--blau-clar));
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(0, 68, 129, 0.2);
        }

        .limit-badge i {
            font-size: 1.3rem;
        }

        /* Grup de fitxers */
        .file-group {
            margin-bottom: 25px;
            background: var(--gris-clar);
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .file-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--blau-mari);
            font-size: 1.1rem;
        }

        .file-group label i {
            margin-right: 8px;
            color: var(--blau-clar);
        }

        .file-size-limit {
            font-size: 0.85rem;
            background: rgba(0, 68, 129, 0.1);
            padding: 5px 10px;
            border-radius: 20px;
            color: var(--blau-mari);
            font-weight: normal;
        }

        /* Dropzone */
        .dropzone {
            margin-bottom: 15px;
        }

        .file-input-display {
            border: 2px dashed var(--blau-clar);
            border-radius: 10px;
            padding: 30px 20px;
            text-align: center;
            color: var(--gris-mitja);
            background: white;
            transition: 0.3s;
            cursor: pointer;
        }

        .file-input-display:hover {
            background: var(--blau-fons);
            border-color: var(--blau-mari);
        }

        .file-input-display i {
            font-size: 3rem;
            color: var(--blau-mari);
            margin-bottom: 15px;
        }

        .file-count {
            display: none;
            margin-top: 10px;
            font-weight: 600;
            color: var(--blau-mari);
        }

        /* Llista de fitxers */
        #fileListContainer {
            margin-top: 20px;
        }

        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--blau-mari);
        }

        .btn-add-more {
            background: var(--blau-clar);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-add-more:hover {
            background: var(--blau-mari);
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            max-height: 400px;
            overflow-y: auto;
        }

        .file-list-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            background: white;
            cursor: grab;
        }

        .file-list-item:last-child {
            border-bottom: none;
        }

        .file-list-item i {
            margin-right: 10px;
            color: #dc3545;
        }

        .file-list-item .file-name {
            flex: 1;
            font-weight: 500;
            word-break: break-word;
            margin-right: 10px;
        }

        .file-list-item .file-size {
            font-size: 0.85rem;
            background: var(--gris-clar);
            padding: 4px 10px;
            border-radius: 20px;
            color: var(--gris-mitja);
            white-space: nowrap;
            margin-right: 10px;
        }

        .file-list-item .file-actions {
            display: flex;
            gap: 8px;
        }

        .file-actions button {
            background: none;
            border: none;
            color: var(--gris-mitja);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: 0.2s;
        }

        .file-actions button:hover {
            color: var(--blau-mari);
        }

        .file-actions .delete-btn:hover {
            color: var(--vermell-error);
        }

        /* Caixa de text pel nom */
        .name-group {
            margin: 30px 0;
        }

        .name-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--blau-mari);
            font-size: 1.1rem;
        }

        .name-group label i {
            margin-right: 8px;
            color: var(--blau-clar);
        }

        .name-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .name-input:focus {
            border-color: var(--blau-clar);
            outline: none;
            box-shadow: 0 0 0 3px rgba(90, 159, 212, 0.2);
        }

        .name-hint {
            font-size: 0.9rem;
            color: var(--gris-mitja);
            margin-top: 5px;
        }

        /* Botó d'unir */
        .btn-merge {
            background: var(--blau-mari);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-merge:hover {
            background: #003366;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 68, 129, 0.2);
        }

        .btn-merge:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Missatges */
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            background: #e8f5e9;
            color: var(--verd-success);
            border-left: 5px solid var(--verd-success);
        }

        .message.error {
            background: #ffebee;
            color: var(--vermell-error);
            border-left: 5px solid var(--vermell-error);
        }

        .message.warning {
            background: #fff3cd;
            color: #856404;
            border-left: 5px solid #ffc107;
        }

        /* Footer */
        .footer-links {
            margin-top: 30px;
            text-align: center;
        }

        .footer-links a {
            color: var(--blau-mari);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .separator {
            color: var(--gris-mitja);
            margin: 0 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .pdf-card { padding: 25px; }
            h1 { font-size: 1.6rem; }
            .file-list-item {
                flex-wrap: wrap;
            }
            .file-list-item .file-name {
                width: 100%;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Targeta principal -->
        <div class="pdf-card">
           <!-- <div style="display: flex; justify-content: center;">
                <div class="limit-badge">
                    <i class="fas fa-exclamation-triangle"></i>
                    Límit: 100 MB per fitxer (màxim 9 PDFs)
                </div>
            </div>-->

            <h1>📄 Juntar PDFs</h1>
            <p class="subtitle">Selecciona múltiples documents i combina'ls en un sol fitxer</p>

            <!-- Zona de selecció múltiple -->
            <div class="file-group">
                <label>
                    <span><i class="fas fa-file-pdf" style="color: #dc3545;"></i> PDFs</span>
                    <!--<span class="file-size-limit">màxim 100 MB per fitxer</span>-->
                </label>
                
                <!-- Dropzone inicial -->
                <div class="dropzone" id="dropzone">
                    <input type="file" id="fileInput" accept=".pdf" multiple style="display: none;">
                    <div class="file-input-display" id="dropzone-display">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <div>Arrossega els PDFs aquí o fes clic per seleccionar</div>
                        <div id="fileCount" class="file-count">0 fitxers seleccionats</div>
                    </div>
                </div>

                <!-- Llista de fitxers (inicialment oculta) -->
                <div id="fileListContainer" style="display: none;">
                    <div class="file-list-header">
                        <span><i class="fas fa-list"></i> Fitxers seleccionats (arrossega per reordenar)</span>
                        <button id="addMoreBtn" class="btn-add-more"><i class="fas fa-plus"></i> Afegir més</button>
                    </div>
                    <ul id="fileList" class="file-list"></ul>
                </div>
            </div>

            <!-- Nom del fitxer resultant -->
            <div class="name-group">
                <label><i class="fas fa-tag"></i> Nom del fitxer resultant</label>
                <input type="text" id="outputName" class="name-input" placeholder="ex: documents_combinats" value="documents_combinats">
                <div class="name-hint">El fitxer es guardarà automàticament amb extensió .pdf</div>
            </div>

            <!-- Botó d'unir -->
            <button id="mergeBtn" class="btn-merge" onclick="mergePDFs()" disabled>
                <i class="fas fa-object-group"></i> Unir PDFs i descarregar
            </button>

            <!-- Missatges -->
            <div id="messageBox" class="message"></div>
        </div>

        <!-- Footer -->
        <div class="footer-links">
            <a href="https://eines-eficients.github.io">← Tornar a l'inici</a>
            <span class="separator">|</span>
            <a href="#">Què és això?</a>
        </div>
    </div>

    <!-- Incloure PDF-lib per manipular PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    
    <script>
        // Constants
        const MAX_FILE_SIZE = 100 * 1024 * 1024; // 100 MB
        const MAX_FILES = 9;
        const COMPRESS_THRESHOLD = 30 * 1024 * 1024; // 30 MB

        // Estat
        let files = []; // Array d'objectes { file, id } (id per Sortable)
        let sortable = null;

        // Elements del DOM
        const dropzone = document.getElementById('dropzone');
        const dropzoneDisplay = document.getElementById('dropzone-display');
        const fileInput = document.getElementById('fileInput');
        const fileListContainer = document.getElementById('fileListContainer');
        const fileList = document.getElementById('fileList');
        const fileCountSpan = document.getElementById('fileCount');
        const addMoreBtn = document.getElementById('addMoreBtn');
        const mergeBtn = document.getElementById('mergeBtn');
        const outputNameInput = document.getElementById('outputName');
        const messageBox = document.getElementById('messageBox');

        // ========== FUNCIONS AUXILIARS ==========
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }

        // Llegir fitxer com a ArrayBuffer
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // Actualitza el comptador i l'estat del botó
        function updateUI() {
            const count = files.length;
            fileCountSpan.textContent = `${count}/${MAX_FILES} fitxers seleccionats`;

            // Mostrar/amagar dropzone i llista
            if (count === 0) {
                fileListContainer.style.display = 'none';
                dropzone.style.display = 'block';
                mergeBtn.disabled = true;
            } else {
                fileListContainer.style.display = 'block';
                dropzone.style.display = 'none';
                mergeBtn.disabled = (count < 1); // Permet unir fins i tot 1 fitxer (però el sentit és unir-ne diversos)
            }

            // Renderitzar la llista
            renderFileList();
        }

        // Renderitza la llista d'ítems
        function renderFileList() {
            fileList.innerHTML = '';
            files.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'file-list-item';
                li.setAttribute('data-id', item.id);

                // Icona
                const icon = document.createElement('i');
                icon.className = 'fas fa-file-pdf';
                icon.style.color = '#dc3545';

                // Nom
                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                nameSpan.textContent = item.file.name;

                // Mida
                const sizeSpan = document.createElement('span');
                sizeSpan.className = 'file-size';
                sizeSpan.textContent = formatFileSize(item.file.size);

                // Accions
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'file-actions';

                // Botó pujar
                const upBtn = document.createElement('button');
                upBtn.innerHTML = '<i class="fas fa-chevron-up"></i>';
                upBtn.title = 'Moure amunt';
                upBtn.onclick = (e) => {
                    e.stopPropagation();
                    moveItem(index, -1);
                };
                if (index === 0) upBtn.disabled = true;

                // Botó baixar
                const downBtn = document.createElement('button');
                downBtn.innerHTML = '<i class="fas fa-chevron-down"></i>';
                downBtn.title = 'Moure avall';
                downBtn.onclick = (e) => {
                    e.stopPropagation();
                    moveItem(index, 1);
                };
                if (index === files.length - 1) downBtn.disabled = true;

                // Botó eliminar
                const delBtn = document.createElement('button');
                delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                delBtn.className = 'delete-btn';
                delBtn.title = 'Eliminar';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeItem(index);
                };

                actionsDiv.appendChild(upBtn);
                actionsDiv.appendChild(downBtn);
                actionsDiv.appendChild(delBtn);

                li.appendChild(icon);
                li.appendChild(nameSpan);
                li.appendChild(sizeSpan);
                li.appendChild(actionsDiv);

                fileList.appendChild(li);
            });

            // Reinicialitzar Sortable si ja existeix
            if (sortable) sortable.destroy();
            sortable = new Sortable(fileList, {
                animation: 150,
                onEnd: function(evt) {
                    // Quan es reordena, actualitzem l'array files
                    const newOrder = [];
                    const items = fileList.querySelectorAll('.file-list-item');
                    items.forEach(item => {
                        const id = item.getAttribute('data-id');
                        const found = files.find(f => f.id == id);
                        if (found) newOrder.push(found);
                    });
                    files = newOrder;
                    // Tornar a renderitzar per mantenir botons habilitats correctament
                    renderFileList();
                }
            });
        }

        // Mou un element (direcció: -1 amunt, 1 avall)
        function moveItem(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= files.length) return;
            [files[index], files[newIndex]] = [files[newIndex], files[index]];
            renderFileList();
        }

        // Elimina un element
        function removeItem(index) {
            files.splice(index, 1);
            updateUI();
        }

        // Afegeix nous fitxers (des de l'input)
        function addFiles(newFileList) {
            const newFiles = Array.from(newFileList);
            const total = files.length + newFiles.length;
            if (total > MAX_FILES) {
                showMessage(`Només es poden seleccionar fins a ${MAX_FILES} fitxers.`, 'warning');
                return;
            }

            for (let f of newFiles) {
                // Comprovar extensió
                if (!f.name.toLowerCase().endsWith('.pdf')) {
                    showMessage(`El fitxer "${f.name}" no és un PDF.`, 'error');
                    continue;
                }
                // Comprovar mida
                if (f.size > MAX_FILE_SIZE) {
                    showMessage(`El fitxer "${f.name}" supera els 100 MB.`, 'error');
                    continue;
                }
                // Afegir
                files.push({
                    file: f,
                    id: 'file_' + Date.now() + Math.random().toString(36).substr(2, 9)
                });
            }

            updateUI();
        }

        // ========== ESDEVENIMENTS ==========
        // Clic a la dropzone
        dropzoneDisplay.addEventListener('click', () => {
            fileInput.click();
        });

        // Arrossegar i soltar a la dropzone
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzoneDisplay.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzoneDisplay.addEventListener(eventName, highlight, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropzoneDisplay.addEventListener(eventName, unhighlight, false);
        });
        function highlight() {
            dropzoneDisplay.style.background = 'var(--blau-fons)';
            dropzoneDisplay.style.borderColor = 'var(--blau-mari)';
        }
        function unhighlight() {
            dropzoneDisplay.style.background = 'white';
            dropzoneDisplay.style.borderColor = 'var(--blau-clar)';
        }
        dropzoneDisplay.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const droppedFiles = dt.files;
            if (droppedFiles.length > 0) {
                addFiles(droppedFiles);
            }
        });

        // Quan es seleccionen fitxers amb l'input
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                addFiles(fileInput.files);
                fileInput.value = ''; // Permet tornar a seleccionar els mateixos si s'eliminen
            }
        });

        // Botó "Afegir més"
        addMoreBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // ========== FUNCIÓ PRINCIPAL PER UNIR PDFs ==========
        window.mergePDFs = async function() {
            if (files.length === 0) {
                showMessage('Selecciona almenys un PDF.', 'error');
                return;
            }

            // Comprovar que tots els fitxers són vàlids (ja ho vam fer en afegir, però per seguretat)
            for (let item of files) {
                if (item.file.size > MAX_FILE_SIZE) {
                    showMessage(`El fitxer "${item.file.name}" supera els 100 MB.`, 'error');
                    return;
                }
            }

            const originalBtnHtml = mergeBtn.innerHTML;
            mergeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processant...';
            mergeBtn.disabled = true;

            try {
                // Crear document PDF buit
                const mergedPdf = await PDFLib.PDFDocument.create();

                // Processar cada fitxer en ordre
                for (let item of files) {
                    const file = item.file;
                    const pdfBytes = await readFileAsArrayBuffer(file);
                    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
                    const pages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                    pages.forEach(page => mergedPdf.addPage(page));
                }

                // Guardar el PDF resultant
                let mergedPdfBytes = await mergedPdf.save();
                let blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });

                // Comprovar mida
                if (blob.size > COMPRESS_THRESHOLD) {
                    const confirmCompress = confirm(`El fitxer resultant pesa ${formatFileSize(blob.size)}.\nVols reduir la qualitat per facilitar la compartició? (es reduirà aproximadament un 66%)`);
                    if (confirmCompress) {
                        mergeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Comprimint... (pot trigar una mica)';
                        // Comprimir
                        mergedPdfBytes = await compressPDF(mergedPdfBytes);
                        blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                    }
                }

                // Descarregar
                const url = URL.createObjectURL(blob);
                let fileName = outputNameInput.value.trim();
                if (!fileName) fileName = 'documents_combinats';
                if (!fileName.endsWith('.pdf')) fileName += '.pdf';

                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();

                URL.revokeObjectURL(url);
                showMessage('PDFs units correctament!', 'success');

            } catch (error) {
                console.error(error);
                showMessage('Error en unir els PDFs. Assegura\'t que són fitxers PDF vàlids.', 'error');
            } finally {
                mergeBtn.innerHTML = originalBtnHtml;
                mergeBtn.disabled = (files.length === 0);
            }
        };

        // ========== FUNCIÓ DE COMPRESSIÓ ==========
        // Rep un ArrayBuffer del PDF original i retorna un ArrayBuffer del PDF comprimit (convertit a imatges)
        async function compressPDF(originalBuffer) {
            // Carregar document amb pdf.js
            const loadingTask = pdfjsLib.getDocument({ data: originalBuffer });
            const pdf = await loadingTask.promise;
            const numPages = pdf.numPages;

            // Crear nou PDF amb pdf-lib
            const compressedPdf = await PDFLib.PDFDocument.create();

            // Per cada pàgina, renderitzar a canvas amb escala reduïda i qualitat JPEG baixa
            for (let i = 1; i <= numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 0.5 }); // Reduir escala al 50%

                // Crear canvas
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                // Renderitzar pàgina al canvas
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                await page.render(renderContext).promise;

                // Convertir canvas a blob JPEG amb qualitat 0.5
                const jpegBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.5));
                const jpegBytes = await jpegBlob.arrayBuffer();

                // Incrustar imatge al PDF
                const image = await compressedPdf.embedJpg(jpegBytes);
                const pageDimensions = { width: image.width, height: image.height };
                const newPage = compressedPdf.addPage([pageDimensions.width, pageDimensions.height]);
                newPage.drawImage(image, {
                    x: 0,
                    y: 0,
                    width: pageDimensions.width,
                    height: pageDimensions.height,
                });
            }

            // Guardar PDF comprimit
            const compressedBytes = await compressedPdf.save();
            return compressedBytes;
        }

        // Inicialització
        updateUI();
    </script>
</body>
</html>
